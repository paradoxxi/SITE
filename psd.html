<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P1rotsNET</title>

<style>
body{margin:0;font-family:Tahoma;background:#e9edf1;color:black;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#auth{display:flex;justify-content:center;align-items:center;flex:1;}
.auth-box{background:#fff;padding:20px;border:1px solid #ccc;width:90%;max-width:300px;text-align:center;}

#app{display:none;flex:1;flex-direction:column;}
.header{display:flex;justify-content:center;padding:10px;}
.container{display:flex;flex:1;}
.sidebar{width:200px;padding:10px;}
.sidebar button{width:100%;margin-bottom:5px;padding:10px;}
.content{flex:1;padding:10px;overflow:auto;}

.post{border:1px solid #ccc;margin-bottom:10px;padding:10px;border-radius:6px;}
</style>

</head>

<body>

<!-- AUTH -->

<div id="auth">
  <div class="auth-box">
    <h3>Вход</h3>
    <input id="username" placeholder="username"><br><br>
    <input id="password" type="password" placeholder="password"><br><br>
    <button onclick="login()">Войти</button>
    <button onclick="register()">Регистрация</button>
    <div id="authMsg"></div>
  </div>
</div>

<!-- APP -->

<div id="app">
  <div class="header">
    <h3>P1rotsNET</h3>
  </div>

  <div class="container">
    <div class="sidebar">
      <button onclick="openTab('feed')">Лента</button>
      <button onclick="openTab('chat')">Чат</button>
      <button onclick="logout()">Выйти</button>
    </div>

```
<div class="content" id="content"></div>
```

  </div>
</div>

<script>

// ---------------- STATE ----------------
let currentUser = null;
let currentTab = 'feed';
let currentChat = null;
let posts = [];

// ---------------- AUTH ----------------
async function login(){
  const res = await fetch('/api/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  if(!res.ok){
    authMsg.innerText='Ошибка входа';
    return;
  }

  const data = await res.json();
  currentUser = data.username;

  auth.style.display='none';
  app.style.display='flex';

  loadPosts();
}

async function register(){
  const res = await fetch('/api/register', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  authMsg.innerText = res.ok ? 'Создано' : 'Ошибка';
}

function logout(){
  location.reload();
}

// ---------------- NAV ----------------
function openTab(tab){
  currentTab = tab;

  if(tab === 'feed') renderFeed();
  if(tab === 'chat') renderChat();
}

// ---------------- POSTS ----------------
async function loadPosts(){
  const res = await fetch('/api/posts');
  posts = await res.json();
  renderFeed();
}

function renderFeed(){
  const content = document.getElementById('content');

  content.innerHTML = `
    <h3>Лента</h3>
    <input id="text" placeholder="Сообщение">
    <button onclick="createPost()">Пост</button>
    <div id="feed"></div>
  `;

  const feed = document.getElementById('feed');

  posts.slice().reverse().forEach(p=>{
    const d = document.createElement('div');
    d.className = 'post';
    d.innerHTML = `<b>${p.user}</b><br>${p.text}`;
    feed.appendChild(d);
  });
}

async function createPost(){
  const text = document.getElementById('text').value;

  if(!text) return;

  await fetch('/api/posts', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      user: currentUser,
      text: text
    })
  });

  document.getElementById('text').value = '';
  loadPosts();
}

// ---------------- CHAT ----------------
function renderChat(){
  const content = document.getElementById('content');

  content.innerHTML = `
    <h3>Чат</h3>
    <input id="chatUser" placeholder="Кому писать">
    <button onclick="openChat()">Открыть</button>

    <div id="chatBox" style="height:300px;overflow:auto;border:1px solid #ccc;margin:10px 0;"></div>

    <input id="msg" placeholder="Сообщение">
    <button onclick="sendMsg()">Отправить</button>
  `;
}

function getChatId(a,b){
  return [a,b].sort().join('_');
}

async function openChat(){
  const user = document.getElementById('chatUser').value;
  currentChat = getChatId(currentUser, user);
  loadMsgs();
}

async function loadMsgs(){
  if(!currentChat) return;

  const res = await fetch('/api/messages/' + currentChat);
  const msgs = await res.json();

  const box = document.getElementById('chatBox');
  box.innerHTML = '';

  msgs.forEach(m=>{
    const d = document.createElement('div');
    d.innerHTML = `<b>${m.from}:</b> ${m.text}`;
    box.appendChild(d);
  });

  box.scrollTop = box.scrollHeight;
}

async function sendMsg(){
  const input = document.getElementById('msg');
  if(!input.value || !currentChat) return;

  await fetch('/api/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      chatId: currentChat,
      msg: {
        from: currentUser,
        text: input.value,
        time: Date.now()
      }
    })
  });

  input.value = '';
  loadMsgs();
}

</script>

</body>
</html>
